<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Se connecter à demos</title>
<link href="./index_files/css2" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Titillium Web', Verdana, sans-serif;
  background-color: rgb(0, 35, 55);
  color: rgb(255, 255, 255);
}

/* LAYOUT */
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* HEADER — logo flexio */
#kc-header {
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 40px 0 10px;
}
#flexio-logo {
  width: 220px;
  height: 60px;
  background-image: url('https://iam.flexio.io/auth/resources/4lnp1/login/flexio/img/flexio-logo.svg');
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
}
/* Fallback si l'image ne charge pas — on recrée le logo en CSS/texte */
#flexio-logo-fallback {
  display: flex;
  align-items: center;
  gap: 8px;
}
#flexio-logo-fallback .chevron {
  display: flex; gap: 3px;
}
#flexio-logo-fallback .chevron span {
  display: block;
  width: 14px; height: 28px;
  background: rgb(255, 133, 18);
  clip-path: polygon(0 0, 60% 0, 100% 50%, 60% 100%, 0 100%, 40% 50%);
}
#flexio-logo-fallback .chevron span:nth-child(2) {
  margin-left: -6px;
  opacity: 0.75;
}
#flexio-logo-fallback .logo-word {
  font-family: 'Titillium Web', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.5px;
}
#flexio-logo-fallback .logo-word em {
  font-style: normal;
  color: rgb(255, 133, 18);
}

/* CLIENT LOGO + TITRE */
.flx-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 24px 0 8px;
}
#client-logo {
  width: 48px; height: 48px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  margin-bottom: 10px;
}
#kc-page-title {
  font-size: 18px;
  font-weight: 400;
  color: white;
  text-align: center;
  letter-spacing: 0.03em;
}

/* FORM CONTAINER */
#kc-content {
  width: 100%;
  max-width: 640px;
  padding: 0 20px;
}
#kc-form-wrapper {
  width: 100%;
}

/* FORM GROUPS */
.flx-form-group {
  margin-bottom: 16px;
  position: relative;
}
.flx-label {
  display: block;
  font-size: 13px;
  font-weight: 400;
  color: rgb(255, 255, 255);
  margin-bottom: 6px;
  font-family: 'Titillium Web', Verdana, sans-serif;
}
.flx-input {
  display: block;
  width: 100%;
  background-color: rgb(232, 240, 254);
  border: none;
  border-radius: 4.8px;
  padding: 9.6px 12px;
  font-size: 16px;
  font-family: 'Titillium Web', Verdana, sans-serif;
  color: rgb(0, 0, 0);
  outline: none;
  transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
  height: 45px;
}
.flx-input:focus {
  box-shadow: 0 0 0 3px rgba(255, 133, 18, 0.35);
}

/* MOT DE PASSE OUBLIÉ */
.flx-reset-pwd {
  text-align: right;
  margin-top: 4px;
}
.flx-reset-pwd a {
  font-size: 13px;
  color: rgb(200, 220, 240);
  text-decoration: none;
  font-family: 'Titillium Web', Verdana, sans-serif;
}
.flx-reset-pwd a:hover { text-decoration: underline; }

/* BOUTON CONNEXION */
.btn-primary {
  display: block;
  width: 100%;
  background-color: rgb(255, 133, 18);
  color: rgb(0, 35, 55);
  border: none;
  border-radius: 6px;
  padding: 9.6px 12px 7.2px;
  font-size: 18px;
  font-weight: 600;
  font-family: 'Titillium Web', Verdana, sans-serif;
  cursor: pointer;
  text-align: center;
  vertical-align: middle;
  transition: background-color 0.15s;
  height: 43px;
  letter-spacing: 0.03em;
}
.btn-primary:hover { background-color: rgb(230, 110, 0); }

/* ERROR */
.error-msg {
  color: rgb(255, 120, 100);
  font-size: 13px;
  text-align: center;
  min-height: 18px;
  margin-bottom: 6px;
  font-family: 'Titillium Web', Verdana, sans-serif;
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER LOGO -->
  <div id="kc-header">
    <div id="flexio-logo-fallback">
      <div class="chevron">
        <span></span><span></span>
      </div>
      <span class="logo-word">flex<em>io</em></span>
    </div>
  </div>

  <!-- CLIENT LOGO + TITRE -->
  <header class="flx-header">
    <div id="client-logo" style="background-image:url(&#39;https://divalto-avv.flexio.io/logo&#39;)"></div>
    <h1 id="kc-page-title">Connexion</h1>
  </header>

  <!-- FORM -->
  <div id="kc-content">
    <div id="kc-form-wrapper">

      <div class="flx-form-group">
        <label for="username" class="flx-label">Identifiant</label>
        <input id="username" class="flx-input" name="username" type="text" value="demo@divalto.com" autocomplete="off">
      </div>

      <div class="flx-form-group">
        <label for="password" class="flx-label">Mot de passe</label>
        <input id="password" class="flx-input" name="password" type="password" value="demo2025" autocomplete="off">
      </div>

      <div class="flx-form-group">
        <div class="flx-reset-pwd">
          <span><a href="file:///C:/Users/omorel/Downloads/index_3.html#">Mot de passe oublié ?</a></span>
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="flx-form-group">
        <input class="btn-primary" type="button" value="Connexion" onclick="doLogin()">
      </div>

    </div>
  </div>
</div>

<script>
function doLogin() {
  const email = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('error-msg');
  if (email === 'demo@divalto.com' && password === 'demo2025') {
    sessionStorage.setItem('flexio_logged', '1');
    window.location.href = 'planning.html';
  } else {
    err.textContent = 'Identifiant ou mot de passe incorrect.';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>


</body></html>
